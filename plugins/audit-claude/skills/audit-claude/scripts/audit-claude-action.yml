name: Audit Claude - Periodic CLAUDE.md & Automation Review

on:
  schedule:
    # Run weekly on Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab
    inputs:
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-20250514'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create reminder issue if no API key
        if: steps.check-key.outputs.has_key == 'false'
        run: |
          # Check if a reminder issue already exists
          EXISTING=$(gh issue list --label "audit-report" --state open --search "audit-claude: API key not configured" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Reminder issue #$EXISTING already exists, skipping."
            exit 0
          fi

          # Create the label if it doesn't exist
          gh label create "audit-report" --description "Periodic audit reports" --color "0E8A16" 2>/dev/null || true

          gh issue create \
            --title "audit-claude: API key not configured -- run audit locally" \
            --label "audit-report" \
            --body "$(cat <<'BODY'
          ## Automated audit could not run

          The scheduled `audit-claude` GitHub Action ran but no `ANTHROPIC_API_KEY` secret is configured for this repository.

          ### Option 1: Run the audit locally

          Open Claude Code in this repo and run:

          ```
          /audit-claude
          ```

          This will perform the full audit and file a GitHub issue with the results.

          ### Option 2: Configure the API key for automated audits

          1. Go to **Settings > Secrets and variables > Actions**
          2. Create a new repository secret named `ANTHROPIC_API_KEY`
          3. Paste your Anthropic API key
          4. The next scheduled run will use it automatically

          See `skills/audit-claude/references/github-action-setup.md` for the full setup guide.

          ---

          *Generated by audit-claude GitHub Action*
          BODY
          )"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Claude Code
        if: steps.check-key.outputs.has_key == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run audit-claude skill
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-20250514' }}"

          claude --print --model "$MODEL" \
            "Run the audit-claude skill on this repository. \
             Perform all steps: CLAUDE.md quality audit, automation recommendations, \
             AI-first development review, delta summary against previous audits, \
             and file a GitHub issue with the combined report. \
             This is an automated run -- do not ask interactive questions."
